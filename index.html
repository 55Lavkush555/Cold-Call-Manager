<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Calls Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <h1>Cold Calls Manager</h1>
        <form action="">
            <input type="text" placeholder="Business name" id="name">
            <input type="text" placeholder="Phone number" id="phone">
            <input type="text" placeholder="Notes" id="notes">
            <div class="btn-container">
                <button type="submit" id="submit">Add</button>
                <button type="submit" id="export">Export Data</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone Number</th>
                    <th>Notes</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
